<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Forum&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="shortcut icon" href="./assets/img/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="style.css">
	<title>Louvre Museum</title>
</head>

<body>
	<div class="wrapper">
		<header class="header">
			<div class="container">
				<div class="header__row">
					<a href="#!" class="header__logo">Louvre</a>
					<nav class="header__menu">
						<ul class="header__menu-row">
							<li class="header__menu-item"><a href="#visiting" class="header__menu-link">Visiting</a></li>
							<li class="header__menu-item"><a href="#explore" class="header__menu-link">Explore</a></li>
							<li class="header__menu-item"><a href="#video" class="header__menu-link">Video</a></li>
							<li class="header__menu-item"><a href="#gallery" class="header__menu-link">Gallery</a></li>
							<li class="header__menu-item"><a href="#tickets" class="header__menu-link">Tickets</a></li>
							<li class="header__menu-item"><a href="#contacts" class="header__menu-link">Contacts</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</header>
		<main class="main">
			<!-- welcome section -->
			<section class="section dark-section">
				<div class="container">
					<div class="welcome-row">
						<div class="welcome-body">
							<h1 class="welcome-title">Welcome <br> to the Louvre</h1>
							<p class="welcome-subtitle">From the castle to the museum</p>
							<a href="#!" class="welcome-link">Discover the Louvre</a>
						</div>
						<div class="welcome-slider">
							<ul class="welcome-slider__slider">
								<div class="welcome-slider__item">
									<img src="assets/img/welcome/1.jpg" alt="Mona Lisa">
								</div>
							</ul>
							<div class="welcome-slider__pagination ">
								<div class="welcome-slider__position"><span>01</span><span>|</span><span>05</span></div>
								<div class="welcome-slider__dots">
									<button class="welcome-slider__dot active-btn"></button>
									<button class="welcome-slider__dot"></button>
									<button class="welcome-slider__dot"></button>
									<button class="welcome-slider__dot"></button>
									<button class="welcome-slider__dot"></button>
								</div>
								<div class="welcome-slider__arrows">
									<button class="welcome-slider__arrow-prev arrow"></button>
									<button class="welcome-slider__arrow-next arrow"></button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
			<!-- visiting section -->
			<section class="section">
				<div class="container"></div>
			</section>
			<!-- explore section -->
			<section class="section dark-section">
				<div class="container"></div>
			</section>
			<!-- video section -->
			<section class="section video-section">
				<div class="container"></div>
			</section>
			<!-- gallery section -->
			<section class="section dark-section">
				<div class="container"></div>
			</section>
			<!-- tickets section -->
			<section class="section">
				<div class="container"></div>
			</section>
			<!-- contacts section -->
			<section class="section">
				<div class="container"></div>
			</section>
		</main>
		<footer class="footer dark-section">
			<div class="container"></div>
		</footer>
	</div>
</body>

</html>
